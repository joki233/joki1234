<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>joki | 笔记</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <style>
      .notes-shell {
        position: relative;
        z-index: 1;
        width: min(800px, calc(100% - 48px));
        margin: 0 auto;
        padding: 48px 0 56px;
      }

      .notes-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-soft);
        text-decoration: none;
        font-size: 0.92rem;
        margin-bottom: 28px;
        transition: color 180ms ease;
      }

      .notes-back:hover {
        color: var(--accent-strong);
      }

      .notes-back svg {
        width: 16px;
        height: 16px;
      }

      .notes-section {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .note-entry {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .note-entry:first-child {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .note-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 20px 0;
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 1.12rem;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: color 180ms ease;
        font-family: inherit;
      }

      .note-toggle:hover {
        color: var(--accent-strong);
      }

      .note-arrow {
        display: inline-block;
        transition: transform 240ms ease;
        font-size: 0.8rem;
        color: var(--text-soft);
      }

      .note-entry.open .note-arrow {
        transform: rotate(90deg);
      }

      .note-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 360ms ease;
      }

      .note-entry.open .note-content {
        max-height: none;
      }

      .note-body {
        padding: 0 0 24px;
        font-size: 1rem;
        line-height: 1.9;
        color: var(--text-muted);
      }

      .note-body p {
        margin: 0 0 14px;
      }

      .note-body a {
        color: var(--accent-strong);
        text-decoration: none;
      }

      .note-body a:hover {
        text-decoration: underline;
      }

      .note-body h1,
      .note-body h2,
      .note-body h3,
      .note-body h4,
      .note-body h5,
      .note-body h6 {
        margin: 20px 0 10px;
        font-size: 1.2rem;
        color: var(--accent-strong);
        font-weight: 700;
      }

      .note-body ul,
      .note-body ol {
        margin: 0 0 14px 24px;
      }

      .note-body code {
        font-family: "Consolas", "Monaco", monospace;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 8px;
        border-radius: 6px;
        color: var(--accent-strong);
      }

      .note-body pre {
        background: rgba(10, 14, 20, 0.72);
        padding: 16px;
        border-radius: 12px;
        overflow-x: auto;
        margin: 0 0 14px;
      }

      .note-body pre code {
        background: transparent;
        padding: 0;
        color: var(--text-main);
      }

      .note-body blockquote {
        border-left: 4px solid var(--accent);
        padding: 12px 16px;
        margin: 0 0 14px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 0 12px 12px 0;
      }

      .note-body blockquote p {
        margin: 0;
        color: var(--text-soft);
      }

      .note-body hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        margin: 20px 0;
      }

      .note-body table {
        border-collapse: collapse;
        width: 100%;
        margin: 0 0 14px;
      }

      .note-body th,
      .note-body td {
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        text-align: left;
      }

      @media (max-width: 640px) {
        .notes-shell {
          width: min(100% - 32px, 800px);
          padding: 32px 0 40px;
        }

        .note-toggle {
          font-size: 1rem;
          padding: 16px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="notes-shell">
      <a class="notes-back" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
      </a>
      <section class="notes-section" id="notesSection"></section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script src="notes-data.js"></script>
    <script>
      const loadedCache = {};

      function getTitle(filename) {
        return filename.replace(/\.md$/i, "");
      }

      function loadNotes() {
        const section = document.getElementById("notesSection");

        mdFiles.forEach((filename) => {
          const title = getTitle(filename);
          const entry = document.createElement("div");
          entry.className = "note-entry";

          const toggle = document.createElement("button");
          toggle.className = "note-toggle";
          toggle.innerHTML = `${title} <span class="note-arrow">&#9654;</span>`;

          const content = document.createElement("div");
          content.className = "note-content";
          const body = document.createElement("div");
          body.className = "note-body";
          content.appendChild(body);

          let loaded = false;

          toggle.addEventListener("click", async () => {
            entry.classList.toggle("open");

            if (entry.classList.contains("open") && !loaded) {
              loaded = true;
              body.innerHTML = "<p style='color:var(--text-soft)'>加载中...</p>";

              try {
                let text;
                if (loadedCache[filename]) {
                  text = loadedCache[filename];
                } else {
                  const res = await fetch("md/" + encodeURIComponent(filename));
                  if (!res.ok) throw new Error("加载失败");
                  text = await res.text();
                  loadedCache[filename] = text;
                }
                body.innerHTML = renderMarkdown(text);
                const retryRenderMath = (retries = 5) => {
                  if (typeof renderMathInElement === "function") {
                    try {
                      renderMathInElement(body, {
                        delimiters: [
                          { left: "$$", right: "$$", display: true },
                          { left: "$", right: "$", display: false }
                        ]
                      });
                    } catch (e) {
                      if (retries > 0) {
                        setTimeout(() => retryRenderMath(retries - 1), 500);
                      }
                    }
                  } else if (retries > 0) {
                    setTimeout(() => retryRenderMath(retries - 1), 500);
                  }
                };
                retryRenderMath();
              } catch {
                body.innerHTML = "<p style='color:var(--text-soft)'>笔记加载失败，请检查文件是否存在。</p>";
              }
            }

            if (entry.classList.contains("open")) {
              content.style.maxHeight = content.scrollHeight + "px";
            } else {
              content.style.maxHeight = "0";
            }
          });

          entry.appendChild(toggle);
          entry.appendChild(content);
          section.appendChild(entry);
        });
      }

      function renderMarkdown(text) {
        let html = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
          return `<pre><code>${code.trim()}</code></pre>`;
        });

        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/~~(.+?)~~/g, "<s>$1</s>");

        html = html.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
        html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
        html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
        html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");

        html = html.replace(/^&gt; (.+)$/gm, "<blockquote><p>$1</p></blockquote>");

        html = html.replace(
          /!\[([^\]]+)\]\(([^)]+)\)/g,
          '<img src="$2" alt="$1" style="max-width:100%;border-radius:12px;margin:12px 0" />'
        );

        html = html.replace(
          /\[((?:[^\[\]]|\[[^\]]*\])+)\]\(([^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noreferrer">$1</a>'
        );

        html = html.replace(/^- (.+)$/gm, "<li>$1</li>");
        html = html.replace(/(<li>.*<\/li>\n?)+/g, "<ul>$&</ul>");

        html = html.replace(/^---+$/gm, "<hr>");

        html = html.replace(/\n\n/g, "</p><p>");
        html = html.replace(/\n/g, "<br>");
        html = "<p>" + html + "</p>";

        html = html.replace(/<p>\s*<\/p>/g, "");

        return html;
      }

      loadNotes();
    </script>
  </body>
</html>
