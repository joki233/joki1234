<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>joki | 笔记</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <style>
      .notes-shell {
        position: relative;
        z-index: 1;
        width: min(800px, calc(100% - 48px));
        margin: 0 auto;
        padding: 48px 0 56px;
      }

      .notes-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-soft);
        text-decoration: none;
        font-size: 0.92rem;
        margin-bottom: 28px;
        transition: color 180ms ease;
      }

      .notes-back:hover {
        color: var(--accent-strong);
      }

      .notes-back svg {
        width: 16px;
        height: 16px;
      }

      .notes-section {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .note-entry {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .note-entry:first-child {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .note-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 20px 0;
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 1.12rem;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        transition: color 180ms ease;
        font-family: inherit;
      }

      .note-toggle:hover {
        color: var(--accent-strong);
      }

      .note-arrow {
        display: inline-block;
        transition: transform 240ms ease;
        font-size: 0.8rem;
        color: var(--text-soft);
      }

      .note-entry.open .note-arrow {
        transform: rotate(90deg);
      }

      .note-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 360ms ease;
      }

      .note-entry.open .note-content {
        max-height: none;
      }

      .note-body {
        padding: 0 0 24px;
        font-size: 1rem;
        line-height: 1.9;
        color: var(--text-muted);
      }

      .note-body p {
        margin: 0 0 14px;
      }

      .note-body a {
        color: var(--accent-strong);
        text-decoration: none;
      }

      .note-body a:hover {
        text-decoration: underline;
      }

      .note-body ul,
      .note-body ol {
        margin: 0 0 14px 24px;
      }

      .note-body code {
        font-family: "Consolas", "Monaco", monospace;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 8px;
        border-radius: 6px;
        color: var(--accent-strong);
      }

      .note-body pre {
        background: rgba(10, 14, 20, 0.72);
        padding: 16px;
        border-radius: 12px;
        overflow-x: auto;
        margin: 0 0 14px;
      }

      .note-body pre code {
        background: transparent;
        padding: 0;
        color: var(--text-main);
      }

      .note-body blockquote {
        border-left: 4px solid var(--accent);
        padding: 12px 16px;
        margin: 0 0 14px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 0 12px 12px 0;
      }

      .note-body blockquote p {
        margin: 0;
        color: var(--text-soft);
      }

      .note-body hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        margin: 20px 0;
      }

      .note-body table {
        border-collapse: collapse;
        width: 100%;
        margin: 0 0 14px;
        font-size: 0.92rem;
      }

      .note-body th,
      .note-body td {
        padding: 8px 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        text-align: center;
      }

      .note-body th {
        background: rgba(255, 255, 255, 0.08);
        color: var(--accent-strong);
        font-weight: 700;
      }

      .note-body td {
        color: var(--text-muted);
      }

      .note-body h1,
      .note-body h2,
      .note-body h3,
      .note-body h4,
      .note-body h5,
      .note-body h6 {
        margin: 20px 0 10px;
        color: var(--accent-strong);
        font-weight: 700;
      }

      .note-body h1 { font-size: 1.5rem; }
      .note-body h2 { font-size: 1.35rem; }
      .note-body h3 { font-size: 1.2rem; }
      .note-body h4 { font-size: 1.1rem; }

      @media (max-width: 640px) {
        .notes-shell {
          width: min(100% - 32px, 800px);
          padding: 32px 0 40px;
        }

        .note-toggle {
          font-size: 1rem;
          padding: 16px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="notes-shell">
      <a class="notes-back" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
      </a>
      <section class="notes-section" id="notesSection"></section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script src="notes-data.js"></script>
    <script>
      const loadedCache = {};

      function getTitle(filename) {
        return filename.replace(/\.md$/i, "");
      }

      function loadNotes() {
        const section = document.getElementById("notesSection");

        mdFiles.forEach((filename) => {
          const title = getTitle(filename);
          const entry = document.createElement("div");
          entry.className = "note-entry";

          const toggle = document.createElement("button");
          toggle.className = "note-toggle";
          toggle.innerHTML = `${title} <span class="note-arrow">&#9654;</span>`;

          const content = document.createElement("div");
          content.className = "note-content";
          const body = document.createElement("div");
          body.className = "note-body";
          content.appendChild(body);

          let loaded = false;

          toggle.addEventListener("click", async () => {
            entry.classList.toggle("open");

            if (entry.classList.contains("open") && !loaded) {
              loaded = true;
              body.innerHTML = "<p style='color:var(--text-soft)'>加载中...</p>";

              try {
                let text;
                if (loadedCache[filename]) {
                  text = loadedCache[filename];
                } else {
                  const res = await fetch("md/" + encodeURIComponent(filename));
                  if (!res.ok) throw new Error("加载失败");
                  text = await res.text();
                  loadedCache[filename] = text;
                }
                body.innerHTML = renderMarkdown(text);
                const retryRenderMath = (retries = 5) => {
                  if (typeof renderMathInElement === "function") {
                    try {
                      renderMathInElement(body, {
                        delimiters: [
                          { left: "$$", right: "$$", display: true },
                          { left: "$", right: "$", display: false }
                        ]
                      });
                    } catch (e) {
                      if (retries > 0) {
                        setTimeout(() => retryRenderMath(retries - 1), 500);
                      }
                    }
                  } else if (retries > 0) {
                    setTimeout(() => retryRenderMath(retries - 1), 500);
                  }
                };
                retryRenderMath();
              } catch {
                body.innerHTML = "<p style='color:var(--text-soft)'>笔记加载失败，请检查文件是否存在。</p>";
              }
            }

            if (entry.classList.contains("open")) {
              content.style.maxHeight = content.scrollHeight + "px";
            } else {
              content.style.maxHeight = "0";
            }
          });

          entry.appendChild(toggle);
          entry.appendChild(content);
          section.appendChild(entry);
        });
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderMarkdown(text) {
        const blocks = [];
        const lines = text.split("\n");
        let i = 0;

        function isTableRow(line) {
          return /^\|.+\|$/.test(line.trim());
        }

        function isHr(line) {
          return /^-{3,}$/.test(line.trim());
        }

        function isHeading(line) {
          return /^#{1,4}\s/.test(line.trim());
        }

        function isBlockquote(line) {
          return /^>\s?/.test(line.trim());
        }

        function isListItem(line) {
          return /^-\s/.test(line.trim());
        }

        while (i < lines.length) {
          const line = lines[i];

          if (/^```/.test(line)) {
            const codeLines = [];
            i++;
            while (i < lines.length && !/^```/.test(lines[i])) {
              codeLines.push(lines[i]);
              i++;
            }
            i++;
            blocks.push({
              type: "code",
              content: escapeHtml(codeLines.join("\n"))
            });
            continue;
          }

          if (line.trim() === "") {
            i++;
            continue;
          }

          if (isHeading(line)) {
            const trimmed = line.trim();
            const level = trimmed.match(/^#+/)[0].length;
            const content = trimmed.replace(/^#+\s*/, "");
            blocks.push({ type: `h${level}`, content: renderInline(escapeHtml(content)) });
            i++;
            continue;
          }

          if (isHr(line)) {
            blocks.push({ type: "hr" });
            i++;
            continue;
          }

          if (isBlockquote(line)) {
            const quoteLines = [];
            while (i < lines.length && isBlockquote(lines[i])) {
              quoteLines.push(lines[i].trim().replace(/^>\s?/, ""));
              i++;
            }
            const innerHtml = renderInline(escapeHtml(quoteLines.join("<br>")));
            blocks.push({ type: "blockquote", content: innerHtml });
            continue;
          }

          if (isTableRow(line) && i + 1 < lines.length && isTableRow(lines[i + 1])) {
            const headers = line.split("|").filter(c => c.trim()).map(c => c.trim());
            i += 2;
            const rows = [];
            while (i < lines.length && isTableRow(lines[i])) {
              const cells = lines[i].split("|").filter(c => c.trim()).map(c => c.trim());
              rows.push(cells);
              i++;
            }
            blocks.push({
              type: "table",
              headers: headers.map(h => renderInline(escapeHtml(h))),
              rows: rows.map(r => r.map(c => renderInline(escapeHtml(c))))
            });
            continue;
          }

          if (isListItem(line)) {
            const items = [];
            while (i < lines.length && isListItem(lines[i])) {
              items.push(lines[i].trim().replace(/^-\s*/, ""));
              i++;
            }
            blocks.push({
              type: "ul",
              items: items.map(item => renderInline(escapeHtml(item)))
            });
            continue;
          }

          const paraLines = [];
          while (i < lines.length && lines[i].trim() !== "" &&
                 !isHeading(lines[i]) && !isHr(lines[i]) &&
                 !isBlockquote(lines[i]) && !/^```/.test(lines[i]) &&
                 !isListItem(lines[i]) && !isTableRow(lines[i])) {
            paraLines.push(lines[i]);
            i++;
          }
          if (paraLines.length > 0) {
            const paraHtml = paraLines
              .map(l => renderInline(escapeHtml(l)))
              .join("<br>");
            blocks.push({ type: "p", content: paraHtml });
          }
        }

        return blocks.map(b => {
          switch (b.type) {
            case "code": return `<pre><code>${b.content}</code></pre>`;
            case "h1": return `<h1>${b.content}</h1>`;
            case "h2": return `<h2>${b.content}</h2>`;
            case "h3": return `<h3>${b.content}</h3>`;
            case "h4": return `<h4>${b.content}</h4>`;
            case "hr": return `<hr>`;
            case "blockquote": return `<blockquote><p>${b.content}</p></blockquote>`;
            case "p": return `<p>${b.content}</p>`;
            case "ul": return `<ul>${b.items.map(item => `<li>${item}</li>`).join("")}</ul>`;
            case "table":
              const thead = `<thead><tr>${b.headers.map(h => `<th>${h}</th>`).join("")}</tr></thead>`;
              const tbody = `<tbody>${b.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>`;
              return `<table>${thead}${tbody}</table>`;
            default: return "";
          }
        }).join("\n");
      }

      function renderInline(html) {
        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/~~(.+?)~~/g, "<s>$1</s>");
        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
        html = html.replace(
          /!\[([^\]]+)\]\(([^)]+)\)/g,
          '<img src="$2" alt="$1" style="max-width:100%;border-radius:12px;margin:12px 0" />'
        );
        html = html.replace(
          /\[((?:[^\[\]]|\[[^\]]*\])+)\]\(([^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noreferrer">$1</a>'
        );
        return html;
      }

      loadNotes();
    </script>
  </body>
</html>
