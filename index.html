<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人博客 - 作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
      /* 背景交给单独的背景层处理，body本身透明 */
      background: transparent;
      display: flex;
      justify-content: center;
      padding: 40px 40px 40px 40px;
    }

    /* ========== 背景层（虚化图片） ========== */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("1.png") no-repeat center center fixed;
      background-size: cover;
      filter: blur(4px);
      opacity: 0.9;
      z-index: -2;
    }

    /* ========== 雪花画布（介于背景与内容之间） ========== */
    #snowCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none; /* 让点击穿透到内容 */
    }

    /* ========== 主布局容器 ========== */
    .main-container {
      display: flex;
      gap: 30px;
      max-width: 1200px;
      width: 100%;
      align-items: flex-start;
    }

    /* ========== 左侧自我介绍卡片（长条，sticky） ========== */
    .intro-side {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 40px;
    }

    .intro-card {
      padding: 30px 24px;
      text-align: center;
      /* 磨砂玻璃效果 */
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .avatar-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 18px;
      border: 3px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      background: #eee;
      display: block;
    }

    .intro-name {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .intro-bio {
      font-size: 15px;
      line-height: 1.7;
      color: #2c2c2c;
      opacity: 0.9;
    }

    /* ========== 右侧内容区 ========== */
    .content-right {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ========== 通用磨砂卡片 ========== */
    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .glass-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }

    /* ========== 音乐卡片（sticky 固定） ========== */
    .music-card {
      position: sticky;
      top: 40px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 24px;
    }

    /* 黑胶风格按钮 */
    .vinyl-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 30% 30%, #555 1%, #111 20%, #222 60%, #0a0a0a 100%);
      box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .vinyl-btn:active {
      transform: scale(0.95);
    }

    /* 唱片中心标签 */
    .vinyl-center {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #c0392b;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vinyl-center svg {
      width: 12px;
      height: 12px;
      fill: white;
    }

    /* 播放时黑胶旋转动画 */
    .vinyl-btn.playing {
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 音乐信息与进度 */
    .music-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .song-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: #222;
      border-radius: 6px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time-display {
      font-size: 13px;
      color: #2c2c2c;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-left: 5px;
    }

    /* ========== 作品列表 ========== */
    .works-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      margin-bottom: -10px;
    }

    .works-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .work-card {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: inherit;
      padding: 16px 20px;
      gap: 20px;
    }

    .work-preview {
      width: 80px;
      height: 80px;
      border-radius: 14px;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    /* 每个作品不同预览色 */
    .work-card:nth-child(1) .work-preview { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
    .work-card:nth-child(2) .work-preview { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
    .work-card:nth-child(3) .work-preview { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); }
    .work-card:nth-child(4) .work-preview { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
    .work-card:nth-child(5) .work-preview { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }

    .work-info {
      flex: 1;
    }

    .work-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #111;
    }

    .work-desc {
      font-size: 14px;
      color: #444;
      opacity: 0.8;
    }

    /* 隐藏默认 audio */
    audio {
      display: none;
    }

  </style>
</head>
<body>

  <!-- 背景模糊层 -->
  <div class="bg-layer"></div>

  <!-- 雪花画布 -->
  <canvas id="snowCanvas"></canvas>

  <!-- 主布局 -->
  <div class="main-container">

    <!-- 左侧：个人介绍 -->
    <aside class="intro-side">
      <div class="intro-card glass-card">
        <img src="2.png" alt="头像" class="avatar-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <!-- 头像加载失败时的备用显示 -->
        <div class="avatar-img" style="display: none; background: linear-gradient(135deg, #667eea, #764ba2); align-items: center; justify-content: center; font-size: 40px; color: white;">👤</div>
        <h1 class="intro-name">你好，我是 Alex</h1>
        <p class="intro-bio">
          一名热爱技术与设计的全栈开发者。<br>
          专注于构建优雅、高性能的 Web 应用，乐于探索创造力的边界。
        </p>
      </div>
    </aside>

    <!-- 右侧：音乐 + 作品 -->
    <main class="content-right">

      <!-- 音乐卡片（sticky） -->
      <div class="music-card glass-card">
        <!-- 黑胶按钮 -->
        <button class="vinyl-btn" id="vinylBtn" aria-label="播放/暂停">
          <div class="vinyl-center">
            <!-- 播放图标 -->
            <svg id="playIconInVinyl" viewBox="0 0 24 24" width="12" height="12">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <!-- 暂停图标 -->
            <svg id="pauseIconInVinyl" viewBox="0 0 24 24" width="12" height="12" style="display: none;">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </div>
        </button>

        <!-- 歌曲信息与进度 -->
        <div class="music-info">
          <div class="song-title">背景音乐 - 1.mp3</div>
          <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
        <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
      </div>

      <!-- 作品区域 -->
      <section class="works-section">
        <h2 class="section-title">我的作品</h2>
        <div class="works-list">
          <!-- 作品 1 -->
          <a href="./1/index.html" class="work-card glass-card">
            <div class="work-preview">1</div>
            <div class="work-info">
              <div class="work-title">作品 1</div>
              <div class="work-desc">交互设计案例</div>
            </div>
          </a>
          <!-- 作品 2 -->
          <a href="./2/index.html" class="work-card glass-card">
            <div class="work-preview">2</div>
            <div class="work-info">
              <div class="work-title">作品 2</div>
              <div class="work-desc">全栈 Web 应用</div>
            </div>
          </a>
          <!-- 作品 3 -->
          <a href="./3/index.html" class="work-card glass-card">
            <div class="work-preview">3</div>
            <div class="work-info">
              <div class="work-title">作品 3</div>
              <div class="work-desc">移动端小程序</div>
            </div>
          </a>
          <!-- 作品 4 -->
          <a href="./4/index.html" class="work-card glass-card">
            <div class="work-preview">4</div>
            <div class="work-info">
              <div class="work-title">作品 4</div>
              <div class="work-desc">数据可视化</div>
            </div>
          </a>
          <!-- 作品 5 -->
          <a href="./5/index.html" class="work-card glass-card">
            <div class="work-preview">5</div>
            <div class="work-info">
              <div class="work-title">作品 5</div>
              <div class="work-desc">创意工具</div>
            </div>
          </a>
        </div>
      </section>
    </main>
  </div>

  <!-- 音频元素 -->
  <audio id="audio" src="1.mp3" preload="metadata"></audio>

  <script>
    (function() {
      // ========== 音乐播放器逻辑 ==========
      const audio = document.getElementById('audio');
      const vinylBtn = document.getElementById('vinylBtn');
      const playIcon = document.getElementById('playIconInVinyl');
      const pauseIcon = document.getElementById('pauseIconInVinyl');
      const progressBar = document.getElementById('progressBar');
      const progressContainer = document.getElementById('progressContainer');
      const timeDisplay = document.getElementById('timeDisplay');

      function formatTime(sec) {
        if (isNaN(sec)) return '00:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }

      function updateProgress() {
        const cur = audio.currentTime;
        const dur = audio.duration;
        if (dur && !isNaN(dur)) {
          progressBar.style.width = `${(cur / dur) * 100}%`;
          timeDisplay.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
        } else {
          timeDisplay.textContent = `${formatTime(cur)} / 00:00`;
        }
      }

      function togglePlay() {
        if (audio.paused) {
          audio.play().catch(e => console.warn('播放失败:', e));
        } else {
          audio.pause();
        }
      }

      function updateVinylState() {
        if (audio.paused) {
          vinylBtn.classList.remove('playing');
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        } else {
          vinylBtn.classList.add('playing');
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
        }
      }

      vinylBtn.addEventListener('click', togglePlay);

      audio.addEventListener('loadedmetadata', updateProgress);
      audio.addEventListener('timeupdate', updateProgress);
      audio.addEventListener('play', updateVinylState);
      audio.addEventListener('pause', updateVinylState);
      audio.addEventListener('ended', () => {
        updateVinylState();
        progressBar.style.width = '0%';
        timeDisplay.textContent = `${formatTime(0)} / ${formatTime(audio.duration)}`;
      });

      // 进度条点击 / 拖动
      function setProgress(e) {
        const rect = progressContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const width = rect.width;
        if (width > 0 && audio.duration) {
          audio.currentTime = (x / width) * audio.duration;
        }
      }

      let dragging = false;
      progressContainer.addEventListener('mousedown', (e) => {
        dragging = true;
        setProgress(e);
      });
      window.addEventListener('mousemove', (e) => {
        if (dragging) setProgress(e);
      });
      window.addEventListener('mouseup', () => { dragging = false; });

      // 初始化
      updateVinylState();
      timeDisplay.textContent = '00:00 / 00:00';

      // ========== 下雪特效（Canvas） ==========
      const canvas = document.getElementById('snowCanvas');
      const ctx = canvas.getContext('2d');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      const flakes = [];
      const MAX_FLAKES = 150;

      class Snowflake {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * -canvas.height;
          this.radius = Math.random() * 3 + 1;
          this.speed = Math.random() * 1.5 + 0.5;
          this.wind = Math.random() * 0.5 - 0.25;
          this.opacity = Math.random() * 0.6 + 0.4;
        }
        update() {
          this.y += this.speed;
          this.x += this.wind;
          if (this.y > canvas.height + 10) {
            this.reset();
          }
          if (this.x < -10) this.x = canvas.width + 10;
          if (this.x > canvas.width + 10) this.x = -10;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < MAX_FLAKES; i++) {
        flakes.push(new Snowflake());
        // 初始随机分布在整个屏幕
        flakes[i].y = Math.random() * canvas.height;
      }

      function animateSnow() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let flake of flakes) {
          flake.update();
          flake.draw();
        }
        requestAnimationFrame(animateSnow);
      }
      animateSnow();

    })();
  </script>
</body>
</html>
